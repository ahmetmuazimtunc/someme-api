# /etc/nginx/sites-available/someme-api
# Symlink: ln -s /etc/nginx/sites-available/someme-api /etc/nginx/sites-enabled/

# ─── Rate limiting zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=20r/m;

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.someme.app;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS main block ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.someme.app;

    # SSL — managed by Certbot (paths filled in automatically)
    ssl_certificate     /etc/letsencrypt/live/api.someme.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.someme.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin"   always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Request size (10 MB for image uploads) ────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout  60s;

    # ── Auth endpoints — stricter rate limit ──────────────────────────────────
    location ~ ^/api/v1/auth/(register|login|password-reset) {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        include            /etc/nginx/proxy_params;
    }

    # ── Upload endpoints — upload rate limit ──────────────────────────────────
    location ~ ^/api/v1/(memes/upload|users/me/avatar) {
        limit_req zone=api_upload burst=10 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        include            /etc/nginx/proxy_params;
    }

    # ── All other API endpoints ────────────────────────────────────────────────
    location / {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        include            /etc/nginx/proxy_params;

        # WebSocket support (for future real-time features)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }

    # ── Health check — no rate limit, no auth ────────────────────────────────
    location = /api/v1/health {
        proxy_pass http://127.0.0.1:3000;
        include    /etc/nginx/proxy_params;
        access_log off;
    }

    # ── Swagger docs ─────────────────────────────────────────────────────────
    location /api/docs {
        proxy_pass http://127.0.0.1:3000;
        include    /etc/nginx/proxy_params;
    }

    # Logging
    access_log /var/log/nginx/someme-api-access.log;
    error_log  /var/log/nginx/someme-api-error.log;
}
